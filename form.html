<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="Styles/styles.css">
</head>
<body>
    
    <header>
        <div class="Nav">    
                <nav>
                    <ul>
                        <li>
                            <a href="Home">Home</a>
                        </li>
                        <li>
                            <a href="About">About</a>
                        </li>
                        <li>
                            <a href="Portfolio">Portfolio</a>
                        </li>
                        <li>
                            <a href="Contact">Contact</a>
                        </li>
                        <li>
                            <a href="Assets/CV & Interview.pdf" target="_blank"><button class="dcv">Download CV</button></a>
                        </li>
                    </ul>
                </nav>
        </div>
    </header>

    <main>

        <form>

            <label for="name"> Your Name
                <input type="text" name="name" id="name" placeholder="Your Name">
            </label>
            
            <label for="email"> Your Email
                <input type="email" name="email" id="email" placeholder="Your Email">
            </label>        

            <label for="number"> Your Mobile Number
                <input type="text" name="number" id="number" placeholder="Your Mobile Number">
            </label>
            
            <label for="Bdate"> Your Birth Date
                <input type="date" name="Bdate" id="Bdate" placeholder="Your Birth Date">
            </label>

            <fieldset>
                <legend>Your Experience</legend>
                    
                    <label for="1Years">
                        <input type="radio" name="Experience" id="1Years"> 1 Years
                    </label>
                    
                    <label for="2Years">
                        <input type="radio" name="Experience" id="2Years"> 2 Years
                    </label>
                    
                    <label for="3Years">
                        <input type="radio" name="Experience" id="3Years"> 3 Years
                    </label>
                    
                    <label for="4Years">
                        <input type="radio" name="Experience" id="4Years"> 4 Years
                    </label>

                    <label for="mYears">
                        <input type="radio" name="Experience" id="mYears"> More Years
                        <textarea name="Experience" id="mYears" placeholder="Enter your experience" rows="1"></textarea>
                    </label>
            
            </fieldset>


        </form>

    </main>
    
    <footer>
        <section>
            <div>
                <p><small class="arr">© All right reserved 2028</small></p>
            </div>
        </section>
    </footer>
</body>
</html>
